name: Publish to PyPI on GitHub Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    if: >
      github.repository == 'mmschlk/shapiq' &&
      startsWith(github.event.release.tag_name, 'v') &&
      !contains(github.event.release.tag_name, '-')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest    # Linux x86_64 (manylinux inside Docker)
          - windows-latest   # Windows AMD64
          - macos-13         # macOS Intel x86_64
          - macos-latest     # macOS Apple Silicon arm64

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        run: uvx cibuildwheel==2.23.3 --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    if: >
      github.repository == 'mmschlk/shapiq' &&
      startsWith(github.event.release.tag_name, 'v') &&
      !contains(github.event.release.tag_name, '-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - run: uv build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          attestations: true
