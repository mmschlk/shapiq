name: Sync to Hugging Face hub

on:
  push:
    branches: [huggingface-spaces]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Clean large files for deployment
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          echo "Removing large files from deployment commit..."

          git rm -r --cached src/shapiq_games/datasets/data || true
          git rm -r --cached docs/source/notebooks || true
          git rm --cached precomputed.zip || true

          echo "Creating clean deployment commit..."

          git commit -m "Clean HF Space deployment (remove large files)" || echo "No changes to commit"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://JJ248:${HF_TOKEN}@huggingface.co/spaces/JJ248/shapiq-leaderboard

          git push hf HEAD:main --force
