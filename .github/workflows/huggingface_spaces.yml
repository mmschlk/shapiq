name: Sync to Hugging Face hub

on:
  push:
    branches: [huggingface-spaces]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Remove large files before deploy
        run: |
          echo "Removing large datasets and artifacts..."

          git rm --cached -r src/shapiq_games/datasets/data || true
          git rm --cached docs/source/notebooks || true
          git rm --cached precomputed.zip || true

          echo "Done cleaning large files."

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git remote add hf https://JJ248:${HF_TOKEN}@huggingface.co/spaces/JJ248/shapiq-leaderboard

          git push hf HEAD:main --force
