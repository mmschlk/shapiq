name: Sync to Hugging Face hub
on:
  push:
    branches: [huggingface-spaces]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install git-filter-repo
        run: pip install git-filter-repo

      - name: Purge files larger than 10MB from entire history
        run: |
          git filter-repo --force --strip-blobs-bigger-than 10M

      - name: Keep only source code files
        run: |
          git filter-repo --force \
            --path-glob '*.py' \
            --path-glob '*.md' \
            --path-glob '*.txt' \
            --path-glob '*.yaml' \
            --path-glob '*.yml' \
            --path-glob '*.toml' \
            --path-glob '*.json'

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://JJ248:${HF_TOKEN}@huggingface.co/spaces/JJ248/shapiq-leaderboard
          git push hf HEAD:main --force
