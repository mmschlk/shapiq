name: Sync to Hugging Face hub
on:
  push:
    branches: [huggingface-spaces]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install git-filter-repo
        run: pip install git-filter-repo

      - name: Purge large/binary files from entire history
        run: |
          git filter-repo --force \
            --path data/ --invert-paths \
            --path docs/ --invert-paths \
            --path src/shapiq_games/datasets/data/ --invert-paths \
            --path src/shapiq_games/benchmark/imagenet_examples/ --invert-paths \
            --path precomputed.zip --invert-paths

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://JJ248:${HF_TOKEN}@huggingface.co/spaces/JJ248/shapiq-leaderboard
          git push hf HEAD:main --force
