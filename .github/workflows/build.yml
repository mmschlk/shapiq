name: Build Wheels and SDist
on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to build (tag, branch, SHA). Defaults to current SHA.'
        required: false
        default: ''
        type: string
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13, macos-latest]
        include:
          - os: macos-13
            macos_target: "13.0"
          - os: macos-latest
            macos_target: "15.0"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.sha }}
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Build wheels
        run: uvx cibuildwheel==3.4.0 --output-dir wheelhouse
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=${{ matrix.macos_target || '15.0' }}"
          UV_PYTHON: ""
      - name: Check wheels were produced
        shell: bash
        run: ls wheelhouse/*.whl | wc -l
      - uses: actions/upload-artifact@v7
        # Only upload when called from publish workflow (has a ref input)
        if: ${{ inputs.ref != '' }}
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.sha }}
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv build --sdist
      - uses: actions/upload-artifact@v7
        if: ${{ inputs.ref != '' }}
        with:
          name: sdist
          path: dist/*.tar.gz
