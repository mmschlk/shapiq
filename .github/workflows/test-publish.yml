name: Publish to Test PyPI

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build and publish (use a tag like v1.5.0 for a clean version)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  build:
    if: github.repository == 'mmschlk/shapiq'
    uses: ./.github/workflows/build.yml
    with:
      ref: ${{ inputs.ref }}
    secrets: inherit

  publish:
    name: Publish to Test PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true
