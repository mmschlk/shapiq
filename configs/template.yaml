# =====================================================================
# shapiq Benchmark Runner - Configuration Template
# This is a configuration template. Please copy this file and modify parameters before running.
# =====================================================================

# ---------------------------------------------------------------------
# 1) Game (Target Dataset) selection
# ---------------------------------------------------------------------
# Supported examples: "SOUM", "BikeSharing", "CaliforniaHousing", "AdultCensus", "Mushroom",
# "Soybean", "Thyroid", "Annealing", "Arrhythmia", "BreastCancer", "Hepatitis",
# "Ionosphere", "Nursery", "Zoo"

# - local_xai: "AdultCensus", "BikeSharing", "CaliforniaHousing", "Mushroom", ...
# - global_xai: "AdultCensus", "BikeSharing", "CaliforniaHousing"
# - synthetic: "SOUM"
game: "Soybean"

# Choose the game family: `local_xai` or `global_xai`.
# local_xai uses a specific sample x and an imputer (needs `x`, `imputer`).
# global_xai explains the full dataset/model behavior (uses loss_function, n_samples_eval, ...).
game_family: "local_xai"


# Current project convention: n_players = 14.
# Budgets must satisfy: 15 <= budget < 16384.
n_players: 14

# ---------------------------------------------------------------------
# 2) Index / interaction order
# ---------------------------------------------------------------------
# Supported indices: "SV", "BV", "SII", "BII", "k-SII", "STII", "FBII", "FSII", "kADD-SHAP", "CHII"
index: "SV"

# Max interaction order.
# Rule Constraints:
# - If index is "SV", max_order must be set to 1.
# - If index is "SII" or other interaction indices, max_order must be >= 2.
max_order: 1

# ---------------------------------------------------------------------
# 3) Game-specific parameters
# ---------------------------------------------------------------------
# local_xai games typically use: x, model_name, imputer
# classification games may also use class_to_explain
# Supported imputers: "marginal", "conditional", "baseline"
# For CaliforniaHousing (local_xai), supported models are:
#   - "decision_tree"
#   - "random_forest"
#   - "gradient_boosting"
#   - "neural_network"
game_params:
  model_name: "decision_tree"
  imputer: "marginal"
  x: 0

# Optional budget generation policy.
# Budgets should be chosen per-game from roughly n+1 to <2^n.
budget_policy:
  strategy: "range"
  start: "n+1"
  end: "2^n-1"
  steps: 10

# ---------------------------------------------------------------------
# 4) Ground truth
# ---------------------------------------------------------------------
ground_truth:
  # "compute" (on-the-fly) or "lookup" (read from cache)
  strategy: "compute"
  # "ExactComputer", "TreeExplainer"
  method: "ExactComputer"
  storage_path: "data/gt_cache.json"

# ---------------------------------------------------------------------
# 5) Approximator Algorithms to Compare (List)
# ---------------------------------------------------------------------
# Make sure the selected approximators are compatible with the chosen index.
#
# Please ensure the selected approximator supports the index configured above.
#
# SV only/common: "KernelSHAP", "SVARM", "UnbiasedKernelSHAP", "StratifiedSamplingSV", "PermutationSamplingSV", "OwenSamplingSV", "kADDSHAP"
# Versatile (SV, SII, STII, FSII): "KernelSHAPIQ", "SVARMIQ", "SHAPIQ", "ProxySHAP", "SPEX", "ProxySPEX", "MSRBiased", "InconsistentKernelSHAPIQ"
# Interaction only: "PermutationSamplingSII", "PermutationSamplingSTII", "RegressionFSII", "RegressionFBII"
approximators:
  - "PermutationSamplingSV"
  - "StratifiedSamplingSV"

# ---------------------------------------------------------------------
# 6) Budgets
# ---------------------------------------------------------------------
# Example smoke-test budgets (valid for n=14): 15 <= budget < 16384.
budgets:
  - 100
  - 500
  - 1000

# ---------------------------------------------------------------------
# 7) Random seeds
# ---------------------------------------------------------------------
seeds:
  - 0
  - 1
  - 2
  - 3
  - 4
