# =====================================================================
# shapiq Benchmark Runner - Configuration Template
# This is a configuration template. Please copy this file and modify parameters before running.
# =====================================================================

# 1. Target Dataset/Game Model
# [Whitelist options]: "CaliforniaHousing", "Mutagenicity", "BikeSharingDemand"
game: "CaliforniaHousing"

# 2. Game-theoretic Index to Compute (Interaction Index)
# [Whitelist options]: "SV", "BV", "SII", "BII", "k-SII", "STII", "FBII", "FSII", "kADD-SHAP", "CHII"
index: "SV"

# 3. Maximum Order of Interactions (Max Order)
# Rule Constraints:
# - If index is "SV", max_order must be set to 1.
# - If index is "SII" or other interaction indices, max_order must be >= 2.
max_order: 1

# 4. Ground Truth Settings
ground_truth:
  # strategy: "compute" (compute on-the-fly) or "lookup" (read from JSON cache)
  strategy: "compute"
  # method: "ExactComputer", "TreeExplainer", or "InterventionalTreeExplainer"
  method: "ExactComputer"
  storage_path: "data/gt_cache.json"

# 5. Approximator Algorithms to Compare (List)
# Note: Please ensure the selected approximator supports the index configured above.
# [SV only/common]: "KernelSHAP", "SVARM", "UnbiasedKernelSHAP", "StratifiedSamplingSV", "PermutationSamplingSV", "OwenSamplingSV", "kADDSHAP"
# [Versatile (SV, SII, STII, FSII)]: "KernelSHAPIQ", "SVARMIQ", "SHAPIQ", "ProxySHAP", "SPEX", "ProxySPEX", "MSRBiased", "InconsistentKernelSHAPIQ"
# [Interaction only]: "PermutationSamplingSII", "PermutationSamplingSTII", "RegressionFSII", "RegressionFBII"
approximators:
  - "KernelSHAPIQ"
  - "ProxySHAP"

# 6. Computational Budgets (List)
budgets:
  - 100
  - 500
  - 1000

# 7. Random Seeds (List)
seeds:
  - 0
  - 1
  - 2
  - 3
  - 4
